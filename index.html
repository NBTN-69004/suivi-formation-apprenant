<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préparation Manœuvre Mensuelle</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
            --border-radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 90px 20px 40px 20px;
        }

        .progress-container {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            padding: 15px 0;
        }

        .progress-wrapper { max-width: 800px; margin: 0 auto; padding: 0 20px; }

        .progress-text {
            display: flex; justify-content: space-between;
            font-weight: 800; font-size: 0.9rem; margin-bottom: 8px;
            color: var(--primary-color); text-transform: uppercase;
        }

        .progress-bar-bg { background: #e0e6ed; height: 14px; border-radius: 20px; overflow: hidden; }

        #progress-fill {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            width: 0%; height: 100%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center; margin-bottom: 30px;
            background: var(--card-bg); border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden;
        }

        .header-image { width: 100%; height: auto; display: block; }
        .header-content { padding: 25px; }
        h1 { color: var(--primary-color); margin: 0; font-size: 1.6rem; font-weight: 800; }
        .subtitle { color: #7f8c8d; margin-top: 5px; font-weight: 500; }

        .section {
            background: var(--card-bg); margin-bottom: 25px; padding: 25px;
            border-radius: var(--border-radius); box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-left: 5px solid #dcdde1;
        }

        .section-title {
            display: flex; align-items: center;
            font-size: 1.2rem; font-weight: 800; margin-bottom: 20px;
            color: var(--primary-color);
        }

        .icon-number {
            background: var(--primary-color); color: white;
            border-radius: 6px; padding: 2px 10px; margin-right: 15px;
        }

        .checklist-item {
            display: flex; align-items: flex-start;
            margin-bottom: 12px; cursor: pointer; padding: 8px;
            border-radius: 8px; transition: all 0.2s;
        }

        .checklist-item:hover { background-color: #f8f9fa; transform: translateX(5px); }

        input[type="checkbox"] {
            margin-top: 4px; margin-right: 15px;
            width: 20px; height: 20px; accent-color: var(--accent-color);
        }

        .content-wrapper { flex: 1; font-weight: 500; }
        
        .reset-container { text-align: center; margin-top: 40px; }
        .btn-reset {
            background: #e74c3c; color: white; border: none;
            padding: 12px 25px; border-radius: 30px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        @media (max-width: 600px) { h1 { font-size: 1.3rem; } }
    </style>
</head>
<body>

<div class="progress-container">
    <div class="progress-wrapper">
        <div class="progress-text">
            <span>Progression Préparation</span>
            <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-fill"></div>
        </div>
    </div>
</div>

<div class="container">
    <header>
        <img src="7D4D447F-24E4-4266-B88A-5FC8E4A6B630.png" alt="Header" class="header-image">
        <div class="header-content">
            <h1>GUIDE E-TUTEUR</h1>
            <p class="subtitle">Organisation de la Manœuvre Mensuelle</p>
        </div>
    </header>

    <div class="section">
        <label class="checklist-item">
            <input type="checkbox" class="task-checkbox">
            <div class="content-wrapper"><strong>Définir le thème</strong> (Incendie, SR, SAP, OD...)</div>
        </label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">1</span> Objectifs</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Identifier les compétences et adapter au niveau</div></label>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Déterminer les critères de réussite</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">2</span> Scénario</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Situation initiale et évènements injectés</div></label>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Définir le contexte (Lieu, bâtiment, victimes)</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">3</span> Logistique</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Sécurisation du site et autorisations</div></label>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Zones engins, observateurs et débriefing</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">4</span> Humain</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Désignation des rôles et plastrons</div></label>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Brief des encadrants et sécurité</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">5</span> Matériel</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Disponibilité engins et simulateurs (fumée, etc.)</div></label>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Vérification de l'état avant départ</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">6</span> Sécurité</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Identification des risques et prévention</div></label>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Moyen d'arrêt immédiat et vérification EPI</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">7</span> Pédagogie</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Briefing initial et grille d'observation</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">8</span> Conduite</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Lancement et adaptation du scénario</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">9</span> Débriefing</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Analyse des points positifs et axes d'amélioration</div></label>
    </div>

    <div class="section">
        <div class="section-title"><span class="icon-number">10</span> Clôture</div>
        <label class="checklist-item"><input type="checkbox" class="task-checkbox"> <div class="content-wrapper">Remise en état et archivage CR</div></label>
    </div>

    <div class="reset-container">
        <button class="btn-reset" onclick="resetForm()">🔄 Réinitialiser la fiche</button>
    </div>
</div>

<script>
    const checkboxes = document.querySelectorAll('.task-checkbox');
    const progressBar = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-percent');

    function updateProgress() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('.task-checkbox:checked').length;
        const percentage = Math.round((checked / total) * 100);
        progressBar.style.width = percentage + '%';
        progressText.innerText = percentage + '%';
        checkboxes.forEach((cb, index) => {
            localStorage.setItem('manoeuvre-step-' + index, cb.checked);
        });
    }

    function loadProgress() {
        checkboxes.forEach((cb, index) => {
            const saved = localStorage.getItem('manoeuvre-step-' + index);
            if (saved === 'true') cb.checked = true;
        });
        updateProgress();
    }

    function resetForm() {
        if(confirm("Voulez-vous effacer toute la progression ?")) {
            checkboxes.forEach((cb, index) => {
                cb.checked = false;
                localStorage.removeItem('manoeuvre-step-' + index);
            });
            updateProgress();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    }

    checkboxes.forEach(cb => cb.addEventListener('change', updateProgress));
    window.onload = loadProgress;
</script>

</body>
</html>
